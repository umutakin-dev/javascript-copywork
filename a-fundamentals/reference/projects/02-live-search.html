<!doctype html>
<!--
  Project 02 — Live search (fetch + debounce + AbortController + delegation)
  Type to search; each debounced keystroke fetches and CANCELS the previous
  in-flight request via AbortController. Needs internet (jsonplaceholder).
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/AbortController
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Project: Live search</title>
    <style>
      body { font: 16px/1.5 system-ui; max-width: 32rem; margin: 2rem auto; }
      ul { list-style: none; padding: 0; }
      li { padding: .25rem 0; cursor: pointer; }
      li:hover { background: #f3f3f3; }
      .meta { color: #777; font-size: .85rem; }
    </style>
  </head>
  <body>
    <h1>Find a user</h1>
    <input id="q" placeholder="type a name…" autocomplete="off" />
    <p id="status"></p>
    <ul id="results"></ul>

    <script type="module">
      const input = document.querySelector("#q");
      const statusEl = document.querySelector("#status");
      const results = document.querySelector("#results");
      let controller = null;

      function debounce(fn, ms) {
        let t;
        return (...a) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...a), ms);
        };
      }

      async function search(query) {
        controller?.abort(); // cancel any request still in flight
        if (!query.trim()) {
          results.replaceChildren();
          statusEl.textContent = "";
          return;
        }
        controller = new AbortController();
        statusEl.textContent = "searching…";
        try {
          const res = await fetch("https://jsonplaceholder.typicode.com/users", {
            signal: controller.signal,
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const users = await res.json();
          const matches = users.filter((u) => u.name.toLowerCase().includes(query.toLowerCase()));
          render(matches);
          statusEl.textContent = `${matches.length} match(es)`;
        } catch (err) {
          if (err.name === "AbortError") return; // superseded by a newer search — ignore
          statusEl.textContent = "error: " + err.message;
        }
      }

      function render(users) {
        results.replaceChildren();
        for (const u of users) {
          const li = document.createElement("li");
          li.dataset.email = u.email;
          const name = document.createElement("strong");
          name.textContent = u.name;
          const meta = document.createElement("span");
          meta.className = "meta";
          meta.textContent = ` — @${u.username}`;
          li.append(name, meta);
          results.append(li);
        }
      }

      // Click a result (delegation) to reveal its email.
      results.addEventListener("click", (e) => {
        const li = e.target.closest("li");
        if (li) statusEl.textContent = `email: ${li.dataset.email}`;
      });

      input.addEventListener("input", debounce((e) => search(e.target.value), 300));
    </script>
  </body>
</html>
