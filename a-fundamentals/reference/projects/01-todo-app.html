<!doctype html>
<!--
  Project 01 — Todo app (DOM + events + localStorage)
  Pulls together: querySelector, createElement/textContent, event delegation,
  dataset, and JSON persistence in localStorage. Serve, open, reload to persist.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/Window/localStorage
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Project: Todo app</title>
    <style>
      body { font: 16px/1.5 system-ui; max-width: 28rem; margin: 2rem auto; }
      ul { list-style: none; padding: 0; }
      li { display: flex; gap: .5rem; align-items: center; }
      li.done span { text-decoration: line-through; color: #999; }
      .filters button[aria-pressed="true"] { font-weight: bold; }
      button { cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Todos</h1>
    <form id="new">
      <input id="title" placeholder="What needs doing?" required autocomplete="off" />
      <button>Add</button>
    </form>
    <ul id="list"></ul>
    <p>
      <span id="count"></span>
      <span class="filters">
        <button data-filter="all" aria-pressed="true">All</button>
        <button data-filter="active" aria-pressed="false">Active</button>
        <button data-filter="done" aria-pressed="false">Done</button>
      </span>
      <button id="clear">Clear done</button>
    </p>

    <script type="module">
      const KEY = "copywork:todos";
      /** @type {{id:number,title:string,done:boolean}[]} */
      let todos = JSON.parse(localStorage.getItem(KEY) ?? "[]");
      let filter = "all";

      const list = document.querySelector("#list");
      const count = document.querySelector("#count");
      const save = () => localStorage.setItem(KEY, JSON.stringify(todos));

      function render() {
        const visible = todos.filter((t) =>
          filter === "all" ? true : filter === "done" ? t.done : !t.done,
        );
        list.replaceChildren();
        for (const todo of visible) {
          const li = document.createElement("li");
          li.dataset.id = todo.id;
          if (todo.done) li.classList.add("done");

          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = todo.done;
          cb.dataset.act = "toggle";

          const span = document.createElement("span");
          span.textContent = todo.title;

          const del = document.createElement("button");
          del.textContent = "✕";
          del.dataset.act = "delete";

          li.append(cb, span, del);
          list.append(li);
        }
        const left = todos.filter((t) => !t.done).length;
        count.textContent = `${left} left · `;
      }

      // Add a todo
      document.querySelector("#new").addEventListener("submit", (e) => {
        e.preventDefault();
        const input = document.querySelector("#title");
        todos.push({ id: Date.now(), title: input.value.trim(), done: false });
        input.value = "";
        save();
        render();
      });

      // Toggle / delete via ONE delegated listener
      list.addEventListener("click", (e) => {
        const li = e.target.closest("li");
        if (!li) return;
        const id = Number(li.dataset.id);
        const act = e.target.dataset.act;
        if (act === "toggle") {
          const todo = todos.find((t) => t.id === id);
          todo.done = !todo.done;
        } else if (act === "delete") {
          todos = todos.filter((t) => t.id !== id);
        } else return;
        save();
        render();
      });

      // Filters
      document.querySelector(".filters").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-filter]");
        if (!btn) return;
        filter = btn.dataset.filter;
        for (const b of document.querySelectorAll(".filters button")) {
          b.setAttribute("aria-pressed", String(b === btn));
        }
        render();
      });

      // Clear completed
      document.querySelector("#clear").addEventListener("click", () => {
        todos = todos.filter((t) => !t.done);
        save();
        render();
      });

      render();
    </script>
  </body>
</html>
