<!doctype html>
<!--
  Phase 6 · 28 — ResizeObserver: react to an element's size changes
  Better than the window 'resize' event — fires for THIS element, any cause.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/ResizeObserver
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ResizeObserver</title>
    <style>
      #box {
        resize: both; overflow: auto; width: 200px; height: 120px;
        border: 2px dashed #888; padding: .5rem;
      }
    </style>
  </head>
  <body>
    <p>Drag the box's bottom-right corner to resize it.</p>
    <div id="box">drag my corner</div>
    <p id="out"></p>

    <script type="module">
      const box = document.querySelector("#box");
      const out = document.querySelector("#out");

      const observer = new ResizeObserver((entries) => {
        for (const entry of entries) {
          const { width, height } = entry.contentRect;
          out.textContent = `${Math.round(width)} × ${Math.round(height)} px`;
          console.log("resized:", width, height);
        }
      });
      observer.observe(box);
    </script>
  </body>
</html>
