<!doctype html>
<!--
  A10 · 05 — A spinning cube in WebGPU, reusing math.js, with depth
  The same column-major mat4 from A5 feeds a WGSL mat4x4f uniform unchanged (WGSL
  matrices are column-major too). Depth testing needs a DEPTH TEXTURE plus a
  depthStencil block on the pipeline and a depthStencilAttachment on the pass.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/GPURenderPipeline
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A10·05 cube</title>
    <style>
      canvas { width: 360px; height: 360px; border: 1px solid #999; }
      #msg { color: #b00; }
    </style>
  </head>
  <body>
    <canvas id="c" width="720" height="720"></canvas>
    <p id="msg"></p>
    <script type="module">
      import { initWebGPU, wgsl } from "./gpu.js";
      import { perspective, lookAt, multiply, rotationX, rotationY, toRadians } from "../a5-math/math.js";
      import { makeCube } from "../a6-3d/geometry.js";

      const canvas = document.querySelector("#c");
      const msg = document.querySelector("#msg");
      try {
        const { device, context, format } = await initWebGPU(canvas);

        const module = device.createShaderModule({
          code: wgsl`
            struct Uniforms { mvp: mat4x4f };
            @group(0) @binding(0) var<uniform> u: Uniforms;

            struct VsOut {
              @builtin(position) pos: vec4f,
              @location(0) color: vec3f,
            };
            @vertex
            fn vs(@location(0) position: vec3f, @location(1) color: vec3f) -> VsOut {
              var out: VsOut;
              out.pos = u.mvp * vec4f(position, 1.0);
              out.color = color;
              return out;
            }
            @fragment
            fn fs(in: VsOut) -> @location(0) vec4f { return vec4f(in.color, 1.0); }`,
        });

        const cube = makeCube(); // interleaved position(3) + color(3)
        const vbo = device.createBuffer({
          size: cube.vertices.byteLength,
          usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
        });
        device.queue.writeBuffer(vbo, 0, cube.vertices);
        const ibo = device.createBuffer({
          size: cube.indices.byteLength,
          usage: GPUBufferUsage.INDEX | GPUBufferUsage.COPY_DST,
        });
        device.queue.writeBuffer(ibo, 0, cube.indices);

        const pipeline = device.createRenderPipeline({
          layout: "auto",
          vertex: {
            module,
            entryPoint: "vs",
            buffers: [
              {
                arrayStride: 6 * 4,
                attributes: [
                  { shaderLocation: 0, offset: 0, format: "float32x3" }, // position
                  { shaderLocation: 1, offset: 3 * 4, format: "float32x3" }, // color
                ],
              },
            ],
          },
          fragment: { module, entryPoint: "fs", targets: [{ format }] },
          primitive: { topology: "triangle-list", cullMode: "back" },
          depthStencil: { format: "depth24plus", depthWriteEnabled: true, depthCompare: "less" },
        });

        // A depth texture the size of the canvas drawing buffer.
        const depthTexture = device.createTexture({
          size: [canvas.width, canvas.height],
          format: "depth24plus",
          usage: GPUTextureUsage.RENDER_ATTACHMENT,
        });

        const uniformBuffer = device.createBuffer({
          size: 64, // one mat4x4f
          usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        });
        const bindGroup = device.createBindGroup({
          layout: pipeline.getBindGroupLayout(0),
          entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
        });

        const view = lookAt([0, 0, 3], [0, 0, 0], [0, 1, 0]);
        const proj = perspective(toRadians(50), canvas.width / canvas.height, 0.1, 100);

        function frame(nowMs) {
          const t = nowMs / 1000;
          const model = multiply(rotationY(t * 0.8), rotationX(t * 0.5));
          const mvp = multiply(multiply(proj, view), model);
          device.queue.writeBuffer(uniformBuffer, 0, new Float32Array(mvp));

          const encoder = device.createCommandEncoder();
          const pass = encoder.beginRenderPass({
            colorAttachments: [
              {
                view: context.getCurrentTexture().createView(),
                clearValue: { r: 0.1, g: 0.12, b: 0.16, a: 1 },
                loadOp: "clear",
                storeOp: "store",
              },
            ],
            depthStencilAttachment: {
              view: depthTexture.createView(),
              depthClearValue: 1.0,
              depthLoadOp: "clear",
              depthStoreOp: "store",
            },
          });
          pass.setPipeline(pipeline);
          pass.setBindGroup(0, bindGroup);
          pass.setVertexBuffer(0, vbo);
          pass.setIndexBuffer(ibo, "uint16");
          pass.drawIndexed(cube.indexCount);
          pass.end();
          device.queue.submit([encoder.finish()]);
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
        console.log("a depth-tested WebGPU cube, MVP from math.js");
      } catch (e) {
        msg.textContent = e.message;
        console.error(e);
      }
    </script>
  </body>
</html>
