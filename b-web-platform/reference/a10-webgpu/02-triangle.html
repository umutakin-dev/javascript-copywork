<!doctype html>
<!--
  A10 · 02 — A WGSL triangle with a vertex buffer
  One shader MODULE holds both the vertex (@vertex) and fragment (@fragment)
  entry points, written in WGSL. A render PIPELINE ties the module to a vertex
  buffer LAYOUT (how bytes map to @location inputs) and the output format.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/GPUDevice/createRenderPipeline
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A10·02 triangle</title>
    <style>
      canvas { width: 320px; height: 320px; border: 1px solid #999; }
      #msg { color: #b00; }
    </style>
  </head>
  <body>
    <canvas id="c" width="640" height="640"></canvas>
    <p id="msg"></p>
    <script type="module">
      import { initWebGPU, wgsl } from "./gpu.js";

      const canvas = document.querySelector("#c");
      const msg = document.querySelector("#msg");
      try {
        const { device, context, format } = await initWebGPU(canvas);

        const module = device.createShaderModule({
          code: wgsl`
            struct VsOut {
              @builtin(position) pos: vec4f,
              @location(0) color: vec3f,
            };
            @vertex
            fn vs(@location(0) position: vec2f, @location(1) color: vec3f) -> VsOut {
              var out: VsOut;
              out.pos = vec4f(position, 0.0, 1.0);
              out.color = color;
              return out;
            }
            @fragment
            fn fs(in: VsOut) -> @location(0) vec4f {
              return vec4f(in.color, 1.0);
            }`,
        });

        // Interleaved: x, y, r, g, b per vertex.
        const verts = new Float32Array([
          0.0, 0.6, 1, 0, 0,
          -0.6, -0.6, 0, 1, 0,
          0.6, -0.6, 0, 0, 1,
        ]);
        const vbo = device.createBuffer({
          size: verts.byteLength,
          usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
        });
        device.queue.writeBuffer(vbo, 0, verts);

        const pipeline = device.createRenderPipeline({
          layout: "auto",
          vertex: {
            module,
            entryPoint: "vs",
            buffers: [
              {
                arrayStride: 5 * 4, // 5 floats per vertex
                attributes: [
                  { shaderLocation: 0, offset: 0, format: "float32x2" }, // position
                  { shaderLocation: 1, offset: 2 * 4, format: "float32x3" }, // color
                ],
              },
            ],
          },
          fragment: { module, entryPoint: "fs", targets: [{ format }] },
          primitive: { topology: "triangle-list" },
        });

        const encoder = device.createCommandEncoder();
        const pass = encoder.beginRenderPass({
          colorAttachments: [
            {
              view: context.getCurrentTexture().createView(),
              clearValue: { r: 0.1, g: 0.12, b: 0.16, a: 1 },
              loadOp: "clear",
              storeOp: "store",
            },
          ],
        });
        pass.setPipeline(pipeline);
        pass.setVertexBuffer(0, vbo);
        pass.draw(3);
        pass.end();
        device.queue.submit([encoder.finish()]);
        console.log("WGSL triangle drawn");
      } catch (e) {
        msg.textContent = e.message;
        console.error(e);
      }
    </script>
  </body>
</html>
