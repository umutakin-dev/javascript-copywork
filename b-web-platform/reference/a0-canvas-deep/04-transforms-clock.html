<!doctype html>
<!--
  A0 · 04 — Transforms and the save/restore stack: an analog clock
  translate/rotate/scale multiply into the canvas's current transform matrix.
  save() pushes that matrix, restore() pops it — so each hand is drawn in its
  own rotated frame without disturbing the others. (Live, via rAF.)
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/CanvasRenderingContext2D/setTransform
-->
<html lang="en">
  <head><meta charset="utf-8" /><title>A0·04 clock</title></head>
  <body>
    <canvas id="c" width="200" height="200"></canvas>
    <script type="module">
      const ctx = document.querySelector("#c").getContext("2d");

      function hand(angle, length, width, color) {
        ctx.save(); // remember the centered transform
        ctx.rotate(angle);
        ctx.lineWidth = width;
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, 10);
        ctx.lineTo(0, -length); // points "up" at angle 0
        ctx.stroke();
        ctx.restore(); // undo the rotate before the next hand
      }

      function draw() {
        ctx.clearRect(0, 0, 200, 200);
        ctx.save();
        ctx.translate(100, 100); // move the origin to the center

        ctx.beginPath();
        ctx.arc(0, 0, 90, 0, Math.PI * 2);
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#333";
        ctx.stroke();

        const now = new Date();
        const s = now.getSeconds();
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;

        hand((h / 12) * Math.PI * 2, 45, 6, "#333"); // hour
        hand((m / 60) * Math.PI * 2, 70, 4, "#333"); // minute
        hand((s / 60) * Math.PI * 2, 80, 2, "crimson"); // second

        ctx.restore();
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    </script>
  </body>
</html>
