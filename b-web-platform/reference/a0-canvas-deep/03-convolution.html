<!doctype html>
<!--
  A0 · 03 — A 3×3 convolution kernel (blur, sharpen, edge-detect)
  For each pixel, take a weighted sum of its 3×3 neighborhood. The weights (the
  "kernel") decide the effect. This is exactly what an image-processing fragment
  shader does later in WebGL — here you do it by hand on the CPU.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/ImageData
-->
<html lang="en">
  <head><meta charset="utf-8" /><title>A0·03 convolution</title></head>
  <body>
    <canvas id="c" width="200" height="140"></canvas>
    <button id="next">Next kernel</button>
    <p id="label"></p>
    <script type="module">
      const ctx = document.querySelector("#c").getContext("2d");

      function drawScene() {
        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, 200, 140);
        ctx.fillStyle = "orange";
        ctx.beginPath();
        ctx.arc(100, 70, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.font = "20px sans-serif";
        ctx.fillText("edge", 70, 76);
      }

      const kernels = {
        identity: [0, 0, 0, 0, 1, 0, 0, 0, 0],
        "box blur": [1, 1, 1, 1, 1, 1, 1, 1, 1].map((n) => n / 9),
        sharpen: [0, -1, 0, -1, 5, -1, 0, -1, 0],
        "edge detect": [-1, -1, -1, -1, 8, -1, -1, -1, -1],
      };

      function applyKernel(kernel) {
        const W = 200;
        const H = 140;
        const src = ctx.getImageData(0, 0, W, H);
        const dst = ctx.createImageData(W, H);
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            let r = 0;
            let g = 0;
            let b = 0;
            for (let ky = -1; ky <= 1; ky++) {
              for (let kx = -1; kx <= 1; kx++) {
                const sx = Math.min(W - 1, Math.max(0, x + kx)); // clamp at edges
                const sy = Math.min(H - 1, Math.max(0, y + ky));
                const si = (sy * W + sx) * 4;
                const k = kernel[(ky + 1) * 3 + (kx + 1)];
                r += src.data[si] * k;
                g += src.data[si + 1] * k;
                b += src.data[si + 2] * k;
              }
            }
            const di = (y * W + x) * 4;
            dst.data[di] = r;
            dst.data[di + 1] = g;
            dst.data[di + 2] = b;
            dst.data[di + 3] = 255;
          }
        }
        ctx.putImageData(dst, 0, 0);
      }

      const names = Object.keys(kernels);
      let i = 0;
      function show() {
        drawScene(); // redraw the source, then filter it
        const name = names[i % names.length];
        applyKernel(kernels[name]);
        document.querySelector("#label").textContent = `kernel: ${name}`;
        console.log("applied", name);
      }
      document.querySelector("#next").addEventListener("click", () => {
        i++;
        show();
      });
      show();
    </script>
  </body>
</html>
