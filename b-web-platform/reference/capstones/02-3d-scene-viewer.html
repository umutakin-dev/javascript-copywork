<!doctype html>
<!--
  Capstone 2 — A 3D scene viewer  (A4 textures × A6 3D × A7 lighting)
  Pulls the graphics track together: a TEXTURED, Blinn-Phong-LIT cube, a light
  orbiting it, and an ORBIT CAMERA you drive with the mouse (drag to rotate, wheel
  to zoom). Geometry carries position + normal + uv; the shader samples the texture
  for albedo and shades it per fragment. Math comes from math.js.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL2RenderingContext
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Capstone · 3D viewer</title>
    <style>
      body { font: 15px system-ui; max-width: 40rem; margin: 1.5rem auto; }
      canvas { width: 100%; aspect-ratio: 4/3; background: #07080c; border-radius: 8px; touch-action: none; cursor: grab; }
    </style>
  </head>
  <body>
    <p>drag to orbit · wheel to zoom</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import { perspective, lookAt, multiply, rotationY, normalMatrix, toRadians } from "../a5-math/math.js";

      // A unit cube with position + normal + uv (24 verts), built generatively.
      function makeTexturedCube() {
        const faces = [
          { n: [1, 0, 0], u: [0, 1, 0], v: [0, 0, 1] },
          { n: [-1, 0, 0], u: [0, 0, 1], v: [0, 1, 0] },
          { n: [0, 1, 0], u: [0, 0, 1], v: [1, 0, 0] },
          { n: [0, -1, 0], u: [1, 0, 0], v: [0, 0, 1] },
          { n: [0, 0, 1], u: [1, 0, 0], v: [0, 1, 0] },
          { n: [0, 0, -1], u: [0, 1, 0], v: [1, 0, 0] },
        ];
        const signs = [[-1, -1], [1, -1], [1, 1], [-1, 1]];
        const uvs = [[0, 0], [1, 0], [1, 1], [0, 1]];
        const vertices = [];
        const indices = [];
        faces.forEach((f, i) => {
          const center = f.n.map((k) => k * 0.5);
          signs.forEach(([su, sv], j) => {
            const p = [0, 1, 2].map((d) => center[d] + 0.5 * (su * f.u[d] + sv * f.v[d]));
            vertices.push(p[0], p[1], p[2], f.n[0], f.n[1], f.n[2], uvs[j][0], uvs[j][1]);
          });
          const base = i * 4;
          indices.push(base, base + 1, base + 2, base, base + 2, base + 3);
        });
        return { vertices: new Float32Array(vertices), indices: new Uint16Array(indices), indexCount: indices.length };
      }

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const program = createProgram(
        gl,
        glsl`#version 300 es
          layout(location=0) in vec3 a_position;
          layout(location=1) in vec3 a_normal;
          layout(location=2) in vec2 a_uv;
          uniform mat4 u_mvp; uniform mat4 u_model; uniform mat3 u_normalMatrix;
          out vec3 v_normal; out vec3 v_worldPos; out vec2 v_uv;
          void main() {
            v_worldPos = (u_model * vec4(a_position, 1.0)).xyz;
            v_normal = u_normalMatrix * a_normal;
            v_uv = a_uv;
            gl_Position = u_mvp * vec4(a_position, 1.0);
          }`,
        glsl`#version 300 es
          precision highp float;
          in vec3 v_normal; in vec3 v_worldPos; in vec2 v_uv;
          uniform sampler2D u_tex; uniform vec3 u_lightPos; uniform vec3 u_cameraPos;
          out vec4 outColor;
          void main() {
            vec3 albedo = texture(u_tex, v_uv).rgb;
            vec3 N = normalize(v_normal);
            vec3 L = normalize(u_lightPos - v_worldPos);
            vec3 V = normalize(u_cameraPos - v_worldPos);
            vec3 H = normalize(L + V);
            float diff = max(dot(N, L), 0.0);
            float spec = pow(max(dot(N, H), 0.0), 48.0);
            outColor = vec4(albedo * (0.15 + 0.85 * diff) + spec * vec3(0.8), 1.0);
          }`,
      );

      const cube = makeTexturedCube();
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, cube.vertices, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 8 * FLOAT;
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 3, gl.FLOAT, false, stride, 0);
      gl.enableVertexAttribArray(1);
      gl.vertexAttribPointer(1, 3, gl.FLOAT, false, stride, 3 * FLOAT);
      gl.enableVertexAttribArray(2);
      gl.vertexAttribPointer(2, 2, gl.FLOAT, false, stride, 6 * FLOAT);
      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cube.indices, gl.STATIC_DRAW);

      // A procedural checker texture (asset-free).
      const SIZE = 16;
      const pixels = new Uint8Array(SIZE * SIZE * 4);
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const on = (x + y) % 2 === 0;
          const i = (y * SIZE + x) * 4;
          pixels[i] = on ? 235 : 60;
          pixels[i + 1] = on ? 170 : 70;
          pixels[i + 2] = on ? 60 : 120;
          pixels[i + 3] = 255;
        }
      }
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, SIZE, SIZE, 0, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);

      const uMvp = gl.getUniformLocation(program, "u_mvp");
      const uModel = gl.getUniformLocation(program, "u_model");
      const uNormalMatrix = gl.getUniformLocation(program, "u_normalMatrix");
      const uLightPos = gl.getUniformLocation(program, "u_lightPos");

      gl.enable(gl.DEPTH_TEST);
      gl.enable(gl.CULL_FACE);
      gl.useProgram(program);
      gl.bindVertexArray(vao);
      gl.uniform1i(gl.getUniformLocation(program, "u_tex"), 0);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, tex);

      // Orbit camera (A6·05).
      const cam = { azimuth: 0.7, elevation: 0.5, radius: 4 };
      let dragging = false;
      let lastX = 0;
      let lastY = 0;
      canvas.addEventListener("pointerdown", (e) => {
        dragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor = "grabbing";
      });
      canvas.addEventListener("pointerup", () => {
        dragging = false;
        canvas.style.cursor = "grab";
      });
      canvas.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        cam.azimuth -= (e.clientX - lastX) * 0.01;
        cam.elevation += (e.clientY - lastY) * 0.01;
        lastX = e.clientX;
        lastY = e.clientY;
        const lim = Math.PI / 2 - 0.05;
        cam.elevation = Math.max(-lim, Math.min(lim, cam.elevation));
      });
      canvas.addEventListener("wheel", (e) => {
        e.preventDefault();
        cam.radius = Math.max(2, Math.min(12, cam.radius * (e.deltaY > 0 ? 1.1 : 0.9)));
      }, { passive: false });

      function frame(nowMs) {
        const t = nowMs / 1000;
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.07, 0.08, 0.12, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        const ce = Math.cos(cam.elevation);
        const eye = [cam.radius * ce * Math.sin(cam.azimuth), cam.radius * Math.sin(cam.elevation), cam.radius * ce * Math.cos(cam.azimuth)];
        const view = lookAt(eye, [0, 0, 0], [0, 1, 0]);
        const proj = perspective(toRadians(50), canvas.width / canvas.height, 0.1, 100);
        const model = rotationY(t * 0.15); // slow auto-spin

        gl.uniformMatrix4fv(uMvp, false, multiply(multiply(proj, view), model));
        gl.uniformMatrix4fv(uModel, false, model);
        gl.uniformMatrix3fv(uNormalMatrix, false, normalMatrix(model));
        gl.uniform3fv(gl.getUniformLocation(program, "u_cameraPos"), eye);
        gl.uniform3f(uLightPos, 3 * Math.cos(t), 2.5, 3 * Math.sin(t)); // orbiting light
        gl.drawElements(gl.TRIANGLES, cube.indexCount, gl.UNSIGNED_SHORT, 0);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log("textured + lit cube, orbit camera");
    </script>
  </body>
</html>
