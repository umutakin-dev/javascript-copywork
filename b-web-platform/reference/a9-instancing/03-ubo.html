<!doctype html>
<!--
  A9 · 03 — Uniform Buffer Objects: share a block of uniforms across programs
  A UBO is a buffer holding a `uniform` block. Bind it to a binding point once and
  EVERY program that declares the same block reads it — so you set the camera once
  per frame, and all your shaders see it (no re-uploading per program).
  Here two programs share a Camera { view, proj } block at binding point 0.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL2RenderingContext/bindBufferBase
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A9·03 UBO</title>
    <style>canvas { width: 420px; height: 320px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import { perspective, lookAt, multiply, translation, rotationY, toRadians } from "../a5-math/math.js";
      import { makeCube } from "../a6-3d/geometry.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      // Both shaders declare the SAME std140 Camera block. Only the fragment color differs.
      const cameraBlock = glsl`
        layout(std140) uniform Camera {
          mat4 u_view;
          mat4 u_proj;
        };`;
      function makeProgram(tint) {
        return createProgram(
          gl,
          glsl`#version 300 es
            ${cameraBlock}
            layout(location=0) in vec3 a_position;
            layout(location=1) in vec3 a_color;
            uniform mat4 u_model;
            out vec3 v_color;
            void main() {
              v_color = a_color;
              gl_Position = u_proj * u_view * u_model * vec4(a_position, 1.0);
            }`,
          glsl`#version 300 es
            precision highp float; in vec3 v_color; out vec4 outColor;
            void main() { outColor = vec4(v_color * ${tint}, 1.0); }`,
        );
      }
      const progA = makeProgram("1.0"); // full color
      const progB = makeProgram("vec3(0.5, 0.7, 1.0)"); // cool tint

      // Point both programs' Camera block at binding point 0.
      for (const p of [progA, progB]) {
        gl.uniformBlockBinding(p, gl.getUniformBlockIndex(p, "Camera"), 0);
      }

      // The UBO: 2 × mat4 = 128 bytes (std140 packs consecutive mat4s tightly).
      const ubo = gl.createBuffer();
      gl.bindBuffer(gl.UNIFORM_BUFFER, ubo);
      gl.bufferData(gl.UNIFORM_BUFFER, 128, gl.DYNAMIC_DRAW);
      gl.bindBufferBase(gl.UNIFORM_BUFFER, 0, ubo); // binding point 0

      const cube = makeCube();
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, cube.vertices, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 6 * FLOAT;
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 3, gl.FLOAT, false, stride, 0);
      gl.enableVertexAttribArray(1);
      gl.vertexAttribPointer(1, 3, gl.FLOAT, false, stride, 3 * FLOAT);
      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cube.indices, gl.STATIC_DRAW);

      gl.enable(gl.DEPTH_TEST);
      gl.bindVertexArray(vao);
      const cameraData = new Float32Array(32); // 16 (view) + 16 (proj)

      function drawCube(program, model) {
        gl.useProgram(program);
        gl.uniformMatrix4fv(gl.getUniformLocation(program, "u_model"), false, model);
        gl.drawElements(gl.TRIANGLES, cube.indexCount, gl.UNSIGNED_SHORT, 0);
      }

      function frame(nowMs) {
        const t = nowMs / 1000;
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.06, 0.07, 0.09, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        // Update the shared camera ONCE — both programs will read it.
        const view = lookAt([0, 1.5, 6], [0, 0, 0], [0, 1, 0]);
        const proj = perspective(toRadians(45), canvas.width / canvas.height, 0.1, 100);
        cameraData.set(view, 0);
        cameraData.set(proj, 16);
        gl.bindBuffer(gl.UNIFORM_BUFFER, ubo);
        gl.bufferSubData(gl.UNIFORM_BUFFER, 0, cameraData);

        drawCube(progA, multiply(translation(-1.3, 0, 0), rotationY(t)));
        drawCube(progB, multiply(translation(1.3, 0, 0), rotationY(-t)));
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log("two programs sharing one camera UBO");
    </script>
  </body>
</html>
