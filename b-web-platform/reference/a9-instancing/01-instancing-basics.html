<!doctype html>
<!--
  A9 · 01 — Instancing basics: one mesh, many copies, one draw call
  vertexAttribDivisor(loc, 1) makes an attribute advance once per INSTANCE instead
  of once per vertex. So a single cube mesh + a per-instance offset + a per-instance
  color, drawn with drawElementsInstanced, paints a whole grid of cubes in ONE call.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL2RenderingContext/vertexAttribDivisor
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A9·01 instancing basics</title>
    <style>canvas { width: 360px; height: 360px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import { perspective, lookAt, multiply, toRadians } from "../a5-math/math.js";
      import { makeCube } from "../a7-lighting/geometry.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        layout(location=0) in vec3 a_position;
        layout(location=1) in vec3 a_normal;
        layout(location=2) in vec3 a_offset;        // PER INSTANCE
        layout(location=3) in vec3 a_instanceColor;  // PER INSTANCE
        uniform mat4 u_viewProj;
        out vec3 v_normal;
        out vec3 v_color;
        void main() {
          v_normal = a_normal;
          v_color = a_instanceColor;
          vec3 world = a_position * 0.35 + a_offset; // shrink the cube, then place it
          gl_Position = u_viewProj * vec4(world, 1.0);
        }`;
      const fs = glsl`#version 300 es
        precision highp float;
        in vec3 v_normal; in vec3 v_color; out vec4 outColor;
        void main() {
          float diff = max(dot(normalize(v_normal), normalize(vec3(0.4, 0.8, 0.6))), 0.0);
          outColor = vec4(v_color * (0.3 + 0.7 * diff), 1.0);
        }`;
      const program = createProgram(gl, vs, fs);

      const cube = makeCube();
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);

      // The shared mesh (advances per vertex — the default divisor 0).
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, cube.vertices, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 6 * FLOAT;
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 3, gl.FLOAT, false, stride, 0);
      gl.enableVertexAttribArray(1);
      gl.vertexAttribPointer(1, 3, gl.FLOAT, false, stride, 3 * FLOAT);
      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cube.indices, gl.STATIC_DRAW);

      // Per-instance data: a 5×5 grid of offsets + colors.
      const offsets = [];
      const colors = [];
      for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 5; j++) {
          offsets.push((i - 2) * 0.9, (j - 2) * 0.9, 0);
          colors.push(i / 4, j / 4, 0.7);
        }
      }
      const COUNT = 25;

      const offsetBuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, offsetBuf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(offsets), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(2);
      gl.vertexAttribPointer(2, 3, gl.FLOAT, false, 0, 0);
      gl.vertexAttribDivisor(2, 1); // advance once PER INSTANCE

      const colorBuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, colorBuf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(3);
      gl.vertexAttribPointer(3, 3, gl.FLOAT, false, 0, 0);
      gl.vertexAttribDivisor(3, 1);

      const uViewProj = gl.getUniformLocation(program, "u_viewProj");
      gl.enable(gl.DEPTH_TEST);
      gl.useProgram(program);
      gl.bindVertexArray(vao);

      function frame() {
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.06, 0.07, 0.09, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
        const view = lookAt([0, 0, 8], [0, 0, 0], [0, 1, 0]);
        const proj = perspective(toRadians(45), canvas.width / canvas.height, 0.1, 100);
        gl.uniformMatrix4fv(uViewProj, false, multiply(proj, view));
        // ONE call draws all 25 cubes.
        gl.drawElementsInstanced(gl.TRIANGLES, cube.indexCount, gl.UNSIGNED_SHORT, 0, COUNT);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log(`drew ${COUNT} cubes in one drawElementsInstanced call`);
    </script>
  </body>
</html>
