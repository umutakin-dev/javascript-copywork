<!doctype html>
<!--
  A9 · 02 — 10,000 cubes in one draw call
  Same instancing, scaled up: 10k random offsets + colors, the whole field slowly
  rotating. Still ONE drawElementsInstanced call per frame — the GPU does the rest.
  This is how a game draws a forest, a crowd, or a particle field.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL2RenderingContext/drawElementsInstanced
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A9·02 10k cubes</title>
    <style>canvas { width: 480px; height: 420px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import { perspective, lookAt, multiply, rotationY, toRadians } from "../a5-math/math.js";
      import { makeCube } from "../a7-lighting/geometry.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        layout(location=0) in vec3 a_position;
        layout(location=1) in vec3 a_normal;
        layout(location=2) in vec3 a_offset;
        layout(location=3) in vec3 a_instanceColor;
        uniform mat4 u_viewProj;
        uniform mat4 u_rotation;          // one rotation for the whole field
        out vec3 v_normal;
        out vec3 v_color;
        void main() {
          v_normal = mat3(u_rotation) * a_normal;
          v_color = a_instanceColor;
          vec3 local = (u_rotation * vec4(a_position * 0.08, 1.0)).xyz;
          vec3 world = local + (u_rotation * vec4(a_offset, 1.0)).xyz;
          gl_Position = u_viewProj * vec4(world, 1.0);
        }`;
      const fs = glsl`#version 300 es
        precision highp float;
        in vec3 v_normal; in vec3 v_color; out vec4 outColor;
        void main() {
          float diff = max(dot(normalize(v_normal), normalize(vec3(0.5, 0.7, 0.5))), 0.0);
          outColor = vec4(v_color * (0.35 + 0.65 * diff), 1.0);
        }`;
      const program = createProgram(gl, vs, fs);

      const cube = makeCube();
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, cube.vertices, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 6 * FLOAT;
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 3, gl.FLOAT, false, stride, 0);
      gl.enableVertexAttribArray(1);
      gl.vertexAttribPointer(1, 3, gl.FLOAT, false, stride, 3 * FLOAT);
      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cube.indices, gl.STATIC_DRAW);

      // 10,000 instances scattered through a sphere, each a random hue.
      const COUNT = 10000;
      const offsets = new Float32Array(COUNT * 3);
      const colors = new Float32Array(COUNT * 3);
      for (let i = 0; i < COUNT; i++) {
        // random point in a ball of radius ~3
        let x, y, z;
        do {
          x = Math.random() * 2 - 1;
          y = Math.random() * 2 - 1;
          z = Math.random() * 2 - 1;
        } while (x * x + y * y + z * z > 1);
        offsets[i * 3] = x * 3;
        offsets[i * 3 + 1] = y * 3;
        offsets[i * 3 + 2] = z * 3;
        colors[i * 3] = 0.5 + 0.5 * Math.sin(i);
        colors[i * 3 + 1] = 0.5 + 0.5 * Math.sin(i * 1.3 + 2);
        colors[i * 3 + 2] = 0.5 + 0.5 * Math.sin(i * 0.7 + 4);
      }

      const offsetBuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, offsetBuf);
      gl.bufferData(gl.ARRAY_BUFFER, offsets, gl.STATIC_DRAW);
      gl.enableVertexAttribArray(2);
      gl.vertexAttribPointer(2, 3, gl.FLOAT, false, 0, 0);
      gl.vertexAttribDivisor(2, 1);

      const colorBuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, colorBuf);
      gl.bufferData(gl.ARRAY_BUFFER, colors, gl.STATIC_DRAW);
      gl.enableVertexAttribArray(3);
      gl.vertexAttribPointer(3, 3, gl.FLOAT, false, 0, 0);
      gl.vertexAttribDivisor(3, 1);

      const uViewProj = gl.getUniformLocation(program, "u_viewProj");
      const uRotation = gl.getUniformLocation(program, "u_rotation");
      gl.enable(gl.DEPTH_TEST);
      gl.useProgram(program);
      gl.bindVertexArray(vao);

      function frame(nowMs) {
        const t = nowMs / 1000;
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.04, 0.04, 0.06, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
        const view = lookAt([0, 0, 9], [0, 0, 0], [0, 1, 0]);
        const proj = perspective(toRadians(45), canvas.width / canvas.height, 0.1, 100);
        gl.uniformMatrix4fv(uViewProj, false, multiply(proj, view));
        gl.uniformMatrix4fv(uRotation, false, rotationY(t * 0.2));
        gl.drawElementsInstanced(gl.TRIANGLES, cube.indexCount, gl.UNSIGNED_SHORT, 0, COUNT);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log(`${COUNT} cubes, one draw call per frame`);
    </script>
  </body>
</html>
