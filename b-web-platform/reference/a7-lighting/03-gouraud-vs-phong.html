<!doctype html>
<!--
  A7 · 03 — Gouraud vs Phong shading (where lighting is computed)
  LEFT (Gouraud): lighting is computed in the VERTEX shader and the final COLOR is
  interpolated. Cheap, but the specular highlight is sampled only at vertices, so
  it looks faceted / can vanish between them.
  RIGHT (Phong): the NORMAL is interpolated and lighting is computed per FRAGMENT.
  Smooth, round highlight. Same low-poly sphere and same light for both.
  Both shaders use layout(location=…) so one VAO feeds either program.
  Ref: https://en.wikipedia.org/wiki/Gouraud_shading
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A7·03 Gouraud vs Phong</title>
    <style>canvas { width: 460px; height: 300px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <p>left: Gouraud (per-vertex) &nbsp;·&nbsp; right: Phong (per-fragment)</p>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import { perspective, lookAt, multiply, translation, normalMatrix, toRadians } from "../a5-math/math.js";
      import { makeSphere } from "./geometry.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      // Lighting computed PER VERTEX → color interpolated.
      const gouraud = createProgram(
        gl,
        glsl`#version 300 es
          layout(location=0) in vec3 a_position;
          layout(location=1) in vec3 a_normal;
          uniform mat4 u_mvp; uniform mat4 u_model; uniform mat3 u_normalMatrix;
          uniform vec3 u_lightPos; uniform vec3 u_cameraPos; uniform vec3 u_albedo; uniform float u_shininess;
          out vec3 v_color;
          void main() {
            vec3 worldPos = (u_model * vec4(a_position, 1.0)).xyz;
            vec3 N = normalize(u_normalMatrix * a_normal);
            vec3 L = normalize(u_lightPos - worldPos);
            vec3 V = normalize(u_cameraPos - worldPos);
            vec3 H = normalize(L + V);
            float diff = max(dot(N, L), 0.0);
            float spec = pow(max(dot(N, H), 0.0), u_shininess);
            v_color = vec3(0.08) + diff * u_albedo + spec * vec3(1.0);
            gl_Position = u_mvp * vec4(a_position, 1.0);
          }`,
        glsl`#version 300 es
          precision highp float; in vec3 v_color; out vec4 outColor;
          void main() { outColor = vec4(v_color, 1.0); }`,
      );

      // Lighting computed PER FRAGMENT → interpolate the normal, shade each pixel.
      const phong = createProgram(
        gl,
        glsl`#version 300 es
          layout(location=0) in vec3 a_position;
          layout(location=1) in vec3 a_normal;
          uniform mat4 u_mvp; uniform mat4 u_model; uniform mat3 u_normalMatrix;
          out vec3 v_normal; out vec3 v_worldPos;
          void main() {
            v_worldPos = (u_model * vec4(a_position, 1.0)).xyz;
            v_normal = u_normalMatrix * a_normal;
            gl_Position = u_mvp * vec4(a_position, 1.0);
          }`,
        glsl`#version 300 es
          precision highp float;
          in vec3 v_normal; in vec3 v_worldPos;
          uniform vec3 u_lightPos; uniform vec3 u_cameraPos; uniform vec3 u_albedo; uniform float u_shininess;
          out vec4 outColor;
          void main() {
            vec3 N = normalize(v_normal);
            vec3 L = normalize(u_lightPos - v_worldPos);
            vec3 V = normalize(u_cameraPos - v_worldPos);
            vec3 H = normalize(L + V);
            float diff = max(dot(N, L), 0.0);
            float spec = pow(max(dot(N, H), 0.0), u_shininess);
            outColor = vec4(vec3(0.08) + diff * u_albedo + spec * vec3(1.0), 1.0);
          }`,
      );

      // A deliberately low-poly sphere so Gouraud's faceting is visible.
      const sphere = makeSphere(12, 16);
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, sphere.vertices, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 6 * FLOAT;
      gl.enableVertexAttribArray(0); // a_position → location 0 in both shaders
      gl.vertexAttribPointer(0, 3, gl.FLOAT, false, stride, 0);
      gl.enableVertexAttribArray(1); // a_normal → location 1
      gl.vertexAttribPointer(1, 3, gl.FLOAT, false, stride, 3 * FLOAT);
      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, sphere.indices, gl.STATIC_DRAW);

      const camera = [0, 0, 5];
      const view = lookAt(camera, [0, 0, 0], [0, 1, 0]);
      gl.enable(gl.DEPTH_TEST);
      gl.bindVertexArray(vao);

      function locs(program) {
        return {
          uMvp: gl.getUniformLocation(program, "u_mvp"),
          uModel: gl.getUniformLocation(program, "u_model"),
          uNormalMatrix: gl.getUniformLocation(program, "u_normalMatrix"),
          uLightPos: gl.getUniformLocation(program, "u_lightPos"),
          uCameraPos: gl.getUniformLocation(program, "u_cameraPos"),
          uAlbedo: gl.getUniformLocation(program, "u_albedo"),
          uShininess: gl.getUniformLocation(program, "u_shininess"),
        };
      }
      const gLocs = locs(gouraud);
      const pLocs = locs(phong);

      function drawSphere(program, l, model, proj, lightPos) {
        gl.useProgram(program);
        gl.uniformMatrix4fv(l.uMvp, false, multiply(multiply(proj, view), model));
        gl.uniformMatrix4fv(l.uModel, false, model);
        gl.uniformMatrix3fv(l.uNormalMatrix, false, normalMatrix(model));
        gl.uniform3fv(l.uLightPos, lightPos);
        gl.uniform3fv(l.uCameraPos, camera);
        gl.uniform3f(l.uAlbedo, 0.3, 0.55, 0.95);
        gl.uniform1f(l.uShininess, 48.0);
        gl.drawElements(gl.TRIANGLES, sphere.indexCount, gl.UNSIGNED_SHORT, 0);
      }

      function frame(nowMs) {
        const t = nowMs / 1000;
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.06, 0.07, 0.09, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        const proj = perspective(toRadians(45), canvas.width / canvas.height, 0.1, 100);
        const lightPos = [3 * Math.cos(t), 2, 3 * Math.sin(t)];
        drawSphere(gouraud, gLocs, translation(-1.3, 0, 0), proj, lightPos);
        drawSphere(phong, pLocs, translation(1.3, 0, 0), proj, lightPos);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log("compare the highlights: faceted (Gouraud) vs smooth (Phong)");
    </script>
  </body>
</html>
