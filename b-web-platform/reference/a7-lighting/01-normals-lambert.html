<!doctype html>
<!--
  A7 · 01 — Normals + the normal matrix + Lambert (ambient + diffuse)
  Lighting needs a surface normal per fragment. We pass the normals attribute,
  transform it by u_normalMatrix (math.js), and in the fragment shader compute
  diffuse = max(dot(N, L), 0) for a directional light. Ambient lifts the shadows.
  A cube shows this cleanly: each face is uniformly lit by its angle to the light.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL_API/Tutorial/Lighting_in_WebGL
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A7·01 Lambert</title>
    <style>canvas { width: 360px; height: 360px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import { perspective, lookAt, multiply, rotationX, rotationY, normalMatrix, normalize, toRadians } from "../a5-math/math.js";
      import { makeCube } from "./geometry.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec3 a_position;
        in vec3 a_normal;
        uniform mat4 u_mvp;
        uniform mat3 u_normalMatrix;
        out vec3 v_normal;
        void main() {
          v_normal = u_normalMatrix * a_normal; // world-space normal
          gl_Position = u_mvp * vec4(a_position, 1.0);
        }`;
      const fs = glsl`#version 300 es
        precision highp float;
        in vec3 v_normal;
        uniform vec3 u_lightDir;   // direction TO the light (normalized)
        uniform vec3 u_lightColor;
        uniform vec3 u_ambient;
        uniform vec3 u_albedo;
        out vec4 outColor;
        void main() {
          vec3 N = normalize(v_normal);
          float diff = max(dot(N, normalize(u_lightDir)), 0.0); // Lambert's cosine law
          vec3 color = u_ambient * u_albedo + diff * u_lightColor * u_albedo;
          outColor = vec4(color, 1.0);
        }`;
      const program = createProgram(gl, vs, fs);

      const cube = makeCube();
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, cube.vertices, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 6 * FLOAT;
      const posLoc = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, stride, 0);
      const normLoc = gl.getAttribLocation(program, "a_normal");
      gl.enableVertexAttribArray(normLoc);
      gl.vertexAttribPointer(normLoc, 3, gl.FLOAT, false, stride, 3 * FLOAT);
      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cube.indices, gl.STATIC_DRAW);

      const uMvp = gl.getUniformLocation(program, "u_mvp");
      const uNormalMatrix = gl.getUniformLocation(program, "u_normalMatrix");
      gl.enable(gl.DEPTH_TEST);
      gl.useProgram(program);
      gl.bindVertexArray(vao);
      gl.uniform3fv(gl.getUniformLocation(program, "u_lightDir"), normalize([0.4, 0.8, 0.6]));
      gl.uniform3f(gl.getUniformLocation(program, "u_lightColor"), 1.0, 1.0, 1.0);
      gl.uniform3f(gl.getUniformLocation(program, "u_ambient"), 0.15, 0.15, 0.18);
      gl.uniform3f(gl.getUniformLocation(program, "u_albedo"), 0.85, 0.45, 0.35);

      function frame(nowMs) {
        const t = nowMs / 1000;
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.06, 0.07, 0.09, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        const model = multiply(rotationY(t * 0.6), rotationX(t * 0.4));
        const view = lookAt([0, 0, 3], [0, 0, 0], [0, 1, 0]);
        const proj = perspective(toRadians(50), canvas.width / canvas.height, 0.1, 100);
        gl.uniformMatrix4fv(uMvp, false, multiply(multiply(proj, view), model));
        gl.uniformMatrix3fv(uNormalMatrix, false, normalMatrix(model));
        gl.drawElements(gl.TRIANGLES, cube.indexCount, gl.UNSIGNED_SHORT, 0);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log("a Lambert-shaded cube");
    </script>
  </body>
</html>
