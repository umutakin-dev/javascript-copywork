<!doctype html>
<!--
  A4 · 02 — Load an IMAGE into a texture (the real, async flow)
  texImage2D also accepts an HTMLImageElement — but images load asynchronously.
  Modern flow: new Image(), set .src, `await img.decode()`, THEN upload. (We make
  the image's data URL from a canvas so there's no file to ship; in real code .src
  would just be a URL like "/textures/wood.png".)
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/HTMLImageElement/decode
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A4·02 image load</title>
    <style>canvas { width: 280px; height: 280px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";

      // Produce a source image WITHOUT shipping a file (a real app would fetch a URL).
      function makeImageURL() {
        const c = document.createElement("canvas");
        c.width = c.height = 128;
        const g = c.getContext("2d");
        const grad = g.createLinearGradient(0, 0, 128, 128);
        grad.addColorStop(0, "tomato");
        grad.addColorStop(1, "royalblue");
        g.fillStyle = grad;
        g.fillRect(0, 0, 128, 128);
        g.fillStyle = "white";
        g.font = "bold 30px sans-serif";
        g.fillText("TEX", 28, 72);
        return c.toDataURL("image/png");
      }

      const img = new Image();
      img.src = makeImageURL(); // in real life: img.src = "/some/url.png"
      await img.decode(); // wait until it's ready — no onload callback needed

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec2 a_position; in vec2 a_uv; out vec2 v_uv;
        void main() { v_uv = a_uv; gl_Position = vec4(a_position, 0.0, 1.0); }`;
      const fs = glsl`#version 300 es
        precision highp float; in vec2 v_uv; uniform sampler2D u_tex; out vec4 outColor;
        void main() { outColor = texture(u_tex, v_uv); }`;
      const program = createProgram(gl, vs, fs);

      const verts = new Float32Array([
        -0.8, 0.8, 0, 1, -0.8, -0.8, 0, 0, 0.8, 0.8, 1, 1,
        0.8, 0.8, 1, 1, -0.8, -0.8, 0, 0, 0.8, -0.8, 1, 0,
      ]);
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 4 * FLOAT;
      const posLoc = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, stride, 0);
      const uvLoc = gl.getAttribLocation(program, "a_uv");
      gl.enableVertexAttribArray(uvLoc);
      gl.vertexAttribPointer(uvLoc, 2, gl.FLOAT, false, stride, 2 * FLOAT);

      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true); // images are top-down; flip to match UVs (see A4·04)
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img); // upload the image
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.generateMipmap(gl.TEXTURE_2D); // 128 is power-of-2, so mipmaps are allowed

      resizeToDisplaySize(canvas);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clearColor(0.1, 0.12, 0.16, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(program);
      gl.uniform1i(gl.getUniformLocation(program, "u_tex"), 0);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.bindVertexArray(vao);
      gl.drawArrays(gl.TRIANGLES, 0, 6);
      console.log("loaded and textured an image (async via img.decode)");
    </script>
  </body>
</html>
