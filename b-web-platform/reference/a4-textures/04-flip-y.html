<!doctype html>
<!--
  A4 · 04 — The UNPACK_FLIP_Y_WEBGL gotcha
  Images and canvases are stored top-to-bottom, but WebGL's texture origin is the
  BOTTOM-left (UV v=0 is the bottom). So an uploaded image appears UPSIDE DOWN
  unless you set gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true) before texImage2D.
  Left quad = no flip (upside down); right quad = flipped (correct).
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGLRenderingContext/pixelStorei
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A4·04 flip Y</title>
    <style>canvas { width: 360px; height: 200px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";

      // A clearly orientation-revealing image: the word "UP" with an arrow.
      function makeImage() {
        const c = document.createElement("canvas");
        c.width = c.height = 128;
        const g = c.getContext("2d");
        g.fillStyle = "#222";
        g.fillRect(0, 0, 128, 128);
        g.fillStyle = "gold";
        g.font = "bold 40px sans-serif";
        g.fillText("UP", 30, 50);
        g.font = "40px sans-serif";
        g.fillText("↑", 52, 100); // upward arrow
        return c;
      }
      const source = makeImage();

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec2 a_position; in vec2 a_uv; out vec2 v_uv;
        void main() { v_uv = a_uv; gl_Position = vec4(a_position, 0.0, 1.0); }`;
      const fs = glsl`#version 300 es
        precision highp float; in vec2 v_uv; uniform sampler2D u_tex; out vec4 outColor;
        void main() { outColor = texture(u_tex, v_uv); }`;
      const program = createProgram(gl, vs, fs);

      // Build one texture for each flip setting.
      function makeTexture(flip) {
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, flip);
        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, source);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        return tex;
      }
      const noFlip = makeTexture(false);
      const flipped = makeTexture(true);

      function makeQuad(x0, x1) {
        const verts = new Float32Array([
          x0, 0.8, 0, 1, x0, -0.8, 0, 0, x1, 0.8, 1, 1,
          x1, 0.8, 1, 1, x0, -0.8, 0, 0, x1, -0.8, 1, 0,
        ]);
        const vao = gl.createVertexArray();
        gl.bindVertexArray(vao);
        const vbo = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
        gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
        const FLOAT = 4;
        const stride = 4 * FLOAT;
        const posLoc = gl.getAttribLocation(program, "a_position");
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, stride, 0);
        const uvLoc = gl.getAttribLocation(program, "a_uv");
        gl.enableVertexAttribArray(uvLoc);
        gl.vertexAttribPointer(uvLoc, 2, gl.FLOAT, false, stride, 2 * FLOAT);
        gl.bindVertexArray(null);
        return vao;
      }
      const leftQuad = makeQuad(-0.9, -0.05);
      const rightQuad = makeQuad(0.05, 0.9);

      resizeToDisplaySize(canvas);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clearColor(0.1, 0.12, 0.16, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(program);
      gl.uniform1i(gl.getUniformLocation(program, "u_tex"), 0);
      gl.activeTexture(gl.TEXTURE0);

      gl.bindVertexArray(leftQuad); // no flip -> upside down
      gl.bindTexture(gl.TEXTURE_2D, noFlip);
      gl.drawArrays(gl.TRIANGLES, 0, 6);

      gl.bindVertexArray(rightQuad); // flipped -> correct
      gl.bindTexture(gl.TEXTURE_2D, flipped);
      gl.drawArrays(gl.TRIANGLES, 0, 6);
      console.log("left = no flip (upside down), right = UNPACK_FLIP_Y (correct)");
    </script>
  </body>
</html>
