<!doctype html>
<!--
  A8 · 04 — A minimal shadow map  (:stretch:)
  Two passes again, but the first renders DEPTH from the LIGHT's point of view into
  a depth texture. In the main pass, each fragment is reprojected into light space;
  if its depth is greater than what the light "saw" first, something is between it
  and the light → it's in shadow.
  Shadow maps are finicky: the `bias` below trades shadow acne for peter-panning —
  tune it in the browser. This is the stretch goal of A8.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL_API
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A8·04 shadow map</title>
    <style>canvas { width: 420px; height: 360px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import { perspective, lookAt, multiply, translation, identity, rotationY, normalMatrix, toRadians } from "../a5-math/math.js";
      import { makeCube } from "../a7-lighting/geometry.js";
      import { createDepthFBO } from "./fbo.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      // Depth-only program: render geometry from the light's POV, writing just depth.
      const depthProg = createProgram(
        gl,
        glsl`#version 300 es
          layout(location=0) in vec3 a_position;
          uniform mat4 u_lightMvp;
          void main() { gl_Position = u_lightMvp * vec4(a_position, 1.0); }`,
        glsl`#version 300 es
          void main() {}`, // no color output — depth is written automatically
      );

      // Main program: Lambert lighting, darkened where the shadow map says "occluded".
      const mainProg = createProgram(
        gl,
        glsl`#version 300 es
          layout(location=0) in vec3 a_position;
          layout(location=1) in vec3 a_normal;
          uniform mat4 u_mvp; uniform mat4 u_model; uniform mat3 u_normalMatrix;
          uniform mat4 u_lightViewProj;
          out vec3 v_normal; out vec3 v_worldPos; out vec4 v_lightSpace;
          void main() {
            vec3 world = (u_model * vec4(a_position, 1.0)).xyz;
            v_worldPos = world;
            v_normal = u_normalMatrix * a_normal;
            v_lightSpace = u_lightViewProj * vec4(world, 1.0);
            gl_Position = u_mvp * vec4(a_position, 1.0);
          }`,
        glsl`#version 300 es
          precision highp float;
          in vec3 v_normal; in vec3 v_worldPos; in vec4 v_lightSpace;
          uniform sampler2D u_shadowMap;
          uniform vec3 u_lightPos;
          uniform vec3 u_albedo;
          out vec4 outColor;

          float shadow() {
            vec3 ndc = v_lightSpace.xyz / v_lightSpace.w;  // light-clip → -1..1
            vec3 uv = ndc * 0.5 + 0.5;                     // → 0..1
            if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0 || uv.z > 1.0) {
              return 1.0; // outside the light's frustum → treat as lit
            }
            float closest = texture(u_shadowMap, uv.xy).r; // nearest depth the light saw
            float bias = 0.003;
            return (uv.z - bias > closest) ? 0.35 : 1.0;    // occluded → darker
          }

          void main() {
            vec3 N = normalize(v_normal);
            vec3 L = normalize(u_lightPos - v_worldPos);
            float diff = max(dot(N, L), 0.0);
            vec3 color = u_albedo * (0.2 + 0.8 * diff * shadow());
            outColor = vec4(color, 1.0);
          }`,
      );

      // --- geometry: a cube + a ground plane (both position + normal, locations 0/1) ---
      const cube = makeCube();
      function makeVao(vertices, indices) {
        const vao = gl.createVertexArray();
        gl.bindVertexArray(vao);
        const vbo = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        const FLOAT = 4;
        const stride = 6 * FLOAT;
        gl.enableVertexAttribArray(0);
        gl.vertexAttribPointer(0, 3, gl.FLOAT, false, stride, 0);
        gl.enableVertexAttribArray(1);
        gl.vertexAttribPointer(1, 3, gl.FLOAT, false, stride, 3 * FLOAT);
        if (indices) {
          const ibo = gl.createBuffer();
          gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
          gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, indices, gl.STATIC_DRAW);
        }
        gl.bindVertexArray(null);
        return vao;
      }
      const cubeVao = makeVao(cube.vertices, cube.indices);
      // A big flat quad at y=0, normal +Y.
      const groundVerts = new Float32Array([
        -4, 0, -4, 0, 1, 0, 4, 0, -4, 0, 1, 0, 4, 0, 4, 0, 1, 0,
        -4, 0, -4, 0, 1, 0, 4, 0, 4, 0, 1, 0, -4, 0, 4, 0, 1, 0,
      ]);
      const groundVao = makeVao(groundVerts, null);

      const SHADOW = 1024;
      const shadowFbo = createDepthFBO(gl, SHADOW);

      const lightPos = [4, 6, 3];
      const lightView = lookAt(lightPos, [0, 0, 0], [0, 1, 0]);
      const lightProj = perspective(toRadians(55), 1, 1.0, 20.0);
      const lightViewProj = multiply(lightProj, lightView);
      const groundModel = identity();

      const dLightMvp = gl.getUniformLocation(depthProg, "u_lightMvp");
      const mUniforms = {
        mvp: gl.getUniformLocation(mainProg, "u_mvp"),
        model: gl.getUniformLocation(mainProg, "u_model"),
        normalMatrix: gl.getUniformLocation(mainProg, "u_normalMatrix"),
        lightViewProj: gl.getUniformLocation(mainProg, "u_lightViewProj"),
        lightPos: gl.getUniformLocation(mainProg, "u_lightPos"),
        albedo: gl.getUniformLocation(mainProg, "u_albedo"),
        shadowMap: gl.getUniformLocation(mainProg, "u_shadowMap"),
      };

      function frame(nowMs) {
        const t = nowMs / 1000;
        const cubeModel = multiply(translation(0, 1, 0), rotationY(t * 0.5));

        // PASS 1 — depth from the light.
        gl.bindFramebuffer(gl.FRAMEBUFFER, shadowFbo.fbo);
        gl.viewport(0, 0, SHADOW, SHADOW);
        gl.enable(gl.DEPTH_TEST);
        gl.clear(gl.DEPTH_BUFFER_BIT);
        gl.useProgram(depthProg);
        gl.bindVertexArray(cubeVao);
        gl.uniformMatrix4fv(dLightMvp, false, multiply(lightViewProj, cubeModel));
        gl.drawElements(gl.TRIANGLES, cube.indexCount, gl.UNSIGNED_SHORT, 0);
        gl.bindVertexArray(groundVao);
        gl.uniformMatrix4fv(dLightMvp, false, multiply(lightViewProj, groundModel));
        gl.drawArrays(gl.TRIANGLES, 0, 6);

        // PASS 2 — shade the scene, sampling the shadow map.
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.07, 0.08, 0.11, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
        gl.useProgram(mainProg);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, shadowFbo.texture);
        gl.uniform1i(mUniforms.shadowMap, 0);
        gl.uniform3fv(mUniforms.lightPos, lightPos);
        gl.uniformMatrix4fv(mUniforms.lightViewProj, false, lightViewProj);

        const view = lookAt([5, 5, 7], [0, 1, 0], [0, 1, 0]);
        const proj = perspective(toRadians(50), canvas.width / canvas.height, 0.1, 100);
        const viewProj = multiply(proj, view);

        function drawObject(vao, model, albedo, count, indexed) {
          gl.bindVertexArray(vao);
          gl.uniformMatrix4fv(mUniforms.mvp, false, multiply(viewProj, model));
          gl.uniformMatrix4fv(mUniforms.model, false, model);
          gl.uniformMatrix3fv(mUniforms.normalMatrix, false, normalMatrix(model));
          gl.uniform3fv(mUniforms.albedo, albedo);
          if (indexed) gl.drawElements(gl.TRIANGLES, count, gl.UNSIGNED_SHORT, 0);
          else gl.drawArrays(gl.TRIANGLES, 0, count);
        }
        drawObject(cubeVao, cubeModel, [0.95, 0.5, 0.3], cube.indexCount, true);
        drawObject(groundVao, groundModel, [0.7, 0.7, 0.75], 6, false);

        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log("shadow map: a cube casting a shadow on the ground (tune `bias` if it's noisy)");
    </script>
  </body>
</html>
