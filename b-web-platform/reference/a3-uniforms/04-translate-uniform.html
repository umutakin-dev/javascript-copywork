<!doctype html>
<!--
  A3 · 04 — A translation uniform, driven by the keyboard
  Pass a vec2 u_offset into the vertex shader and ADD it to every position — so
  one fixed buffer of vertices can move around without re-uploading. Arrow keys
  nudge the offset; a rAF loop applies it. (Click the canvas first to focus it.)
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL2RenderingContext/uniform
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A3·04 translate uniform</title>
    <style>canvas { width: 320px; height: 320px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c" tabindex="0"></canvas>
    <p>click the canvas, then use the arrow keys</p>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec2 a_position;
        uniform vec2 u_offset;
        void main() { gl_Position = vec4(a_position + u_offset, 0.0, 1.0); }`;
      const fs = glsl`#version 300 es
        precision highp float; out vec4 outColor;
        void main() { outColor = vec4(0.2, 0.8, 1.0, 1.0); }`;
      const program = createProgram(gl, vs, fs);

      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0, 0.15, -0.15, -0.15, 0.15, -0.15]), gl.STATIC_DRAW);
      const posLoc = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

      const uOffset = gl.getUniformLocation(program, "u_offset");
      const offset = { x: 0, y: 0 };
      const keys = new Set();
      canvas.addEventListener("keydown", (e) => {
        if (e.key.startsWith("Arrow")) {
          keys.add(e.key);
          e.preventDefault(); // stop the page from scrolling
        }
      });
      canvas.addEventListener("keyup", (e) => keys.delete(e.key));

      gl.useProgram(program);
      gl.bindVertexArray(vao);

      function frame() {
        const speed = 0.02;
        if (keys.has("ArrowLeft")) offset.x -= speed;
        if (keys.has("ArrowRight")) offset.x += speed;
        if (keys.has("ArrowDown")) offset.y -= speed;
        if (keys.has("ArrowUp")) offset.y += speed;

        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.1, 0.12, 0.16, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.uniform2f(uOffset, offset.x, offset.y);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log("arrow keys move the triangle via u_offset");
    </script>
  </body>
</html>
