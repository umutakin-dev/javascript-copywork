<!doctype html>
<!--
  A3 · 01 — A uniform: one value shared by a whole draw call
  Attributes vary PER VERTEX; uniforms are CONSTANT for the entire draw. Here a
  single u_color uniform paints the triangle; click to change it from JS.
  getUniformLocation finds it; uniform3f sets it — note: on the CURRENT program.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL2RenderingContext/uniform
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A3·01 uniform color</title>
    <style>canvas { width: 320px; height: 240px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <p>click the canvas to recolor</p>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec2 a_position;
        void main() { gl_Position = vec4(a_position, 0.0, 1.0); }`;
      const fs = glsl`#version 300 es
        precision highp float;
        uniform vec3 u_color;     // one value for the whole draw
        out vec4 outColor;
        void main() { outColor = vec4(u_color, 1.0); }`;
      const program = createProgram(gl, vs, fs);

      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0, 0.6, -0.6, -0.6, 0.6, -0.6]), gl.STATIC_DRAW);
      const posLoc = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

      const uColor = gl.getUniformLocation(program, "u_color");

      function draw(r, g, b) {
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.1, 0.12, 0.16, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.useProgram(program); // a uniform belongs to the CURRENT program...
        gl.uniform3f(uColor, r, g, b); // ...so set it after useProgram
        gl.bindVertexArray(vao);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
      }

      draw(1, 0.4, 0.2);
      canvas.addEventListener("click", () => draw(Math.random(), Math.random(), Math.random()));
      console.log("uniform-colored triangle — click to recolor");
    </script>
  </body>
</html>
