<!doctype html>
<!--
  A6 · 04 — Many objects, one mesh: a different model matrix per draw
  Upload the cube ONCE, then draw it several times — each with its own model
  matrix (position, rotation, scale). The view and projection are shared; only the
  model (and thus the MVP uniform) changes between draws.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL_API/Matrix_math_for_the_web
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A6·04 multiple objects</title>
    <style>canvas { width: 420px; height: 360px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import {
        perspective, lookAt, multiply, translation, scaling, rotationY, rotationX, toRadians,
      } from "../a5-math/math.js";
      import { makeCube } from "./geometry.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec3 a_position; in vec3 a_color; uniform mat4 u_mvp; out vec3 v_color;
        void main() { v_color = a_color; gl_Position = u_mvp * vec4(a_position, 1.0); }`;
      const fs = glsl`#version 300 es
        precision highp float; in vec3 v_color; out vec4 outColor;
        void main() { outColor = vec4(v_color, 1.0); }`;
      const program = createProgram(gl, vs, fs);

      const cube = makeCube();
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, cube.vertices, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 6 * FLOAT;
      const posLoc = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, stride, 0);
      const colorLoc = gl.getAttribLocation(program, "a_color");
      gl.enableVertexAttribArray(colorLoc);
      gl.vertexAttribPointer(colorLoc, 3, gl.FLOAT, false, stride, 3 * FLOAT);
      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cube.indices, gl.STATIC_DRAW);

      const uMvp = gl.getUniformLocation(program, "u_mvp");
      gl.enable(gl.DEPTH_TEST);
      gl.enable(gl.CULL_FACE);
      gl.useProgram(program);
      gl.bindVertexArray(vao);

      // Five cubes at different positions, each spinning at its own rate/scale.
      const cubes = [
        { pos: [0, 0, 0], scale: 0.9, spin: 0.6 },
        { pos: [-1.6, 0.4, -1], scale: 0.5, spin: 1.4 },
        { pos: [1.6, -0.3, -1], scale: 0.6, spin: -1.0 },
        { pos: [-1.0, -1.0, 0.5], scale: 0.4, spin: 2.0 },
        { pos: [1.1, 1.0, 0.2], scale: 0.45, spin: -1.6 },
      ];

      function frame(nowMs) {
        const t = nowMs / 1000;
        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.1, 0.12, 0.16, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        const view = lookAt([0, 0, 6], [0, 0, 0], [0, 1, 0]);
        const proj = perspective(toRadians(50), canvas.width / canvas.height, 0.1, 100);
        const viewProj = multiply(proj, view); // shared by every cube

        for (const c of cubes) {
          // model = translate · rotate · scale  (applied right-to-left)
          let model = translation(c.pos[0], c.pos[1], c.pos[2]);
          model = multiply(model, rotationY(t * c.spin));
          model = multiply(model, rotationX(t * c.spin * 0.7));
          model = multiply(model, scaling(c.scale, c.scale, c.scale));
          gl.uniformMatrix4fv(uMvp, false, multiply(viewProj, model));
          gl.drawElements(gl.TRIANGLES, cube.indexCount, gl.UNSIGNED_SHORT, 0);
        }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log("five cubes, one mesh, a model matrix each");
    </script>
  </body>
</html>
