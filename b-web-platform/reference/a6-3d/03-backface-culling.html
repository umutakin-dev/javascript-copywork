<!doctype html>
<!--
  A6 · 03 — Backface culling: skip triangles facing away from the camera
  enable(CULL_FACE) drops triangles whose winding faces away — about half a closed
  mesh's triangles, for free. Toggle the mode to feel it:
    BACK  = normal (cull rear faces; looks solid)
    FRONT = cull the FRONT faces → you see straight through to the inside back
            faces (proof the winding/culling works)
    OFF   = draw everything
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGLRenderingContext/cullFace
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A6·03 backface culling</title>
    <style>canvas { width: 360px; height: 360px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <p><button id="mode">cull: BACK</button></p>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";
      import { perspective, lookAt, multiply, rotationX, rotationY, toRadians } from "../a5-math/math.js";
      import { makeCube } from "./geometry.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec3 a_position; in vec3 a_color; uniform mat4 u_mvp; out vec3 v_color;
        void main() { v_color = a_color; gl_Position = u_mvp * vec4(a_position, 1.0); }`;
      const fs = glsl`#version 300 es
        precision highp float; in vec3 v_color; out vec4 outColor;
        void main() { outColor = vec4(v_color, 1.0); }`;
      const program = createProgram(gl, vs, fs);

      const cube = makeCube();
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, cube.vertices, gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 6 * FLOAT;
      const posLoc = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, stride, 0);
      const colorLoc = gl.getAttribLocation(program, "a_color");
      gl.enableVertexAttribArray(colorLoc);
      gl.vertexAttribPointer(colorLoc, 3, gl.FLOAT, false, stride, 3 * FLOAT);
      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cube.indices, gl.STATIC_DRAW);

      const uMvp = gl.getUniformLocation(program, "u_mvp");
      gl.enable(gl.DEPTH_TEST);
      gl.useProgram(program);
      gl.bindVertexArray(vao);

      const modes = ["BACK", "FRONT", "OFF"];
      let mode = 0;
      document.querySelector("#mode").addEventListener("click", (e) => {
        mode = (mode + 1) % modes.length;
        e.target.textContent = `cull: ${modes[mode]}`;
      });

      function frame(nowMs) {
        const t = nowMs / 1000;
        // Apply the current cull mode.
        if (modes[mode] === "OFF") {
          gl.disable(gl.CULL_FACE);
        } else {
          gl.enable(gl.CULL_FACE);
          gl.cullFace(modes[mode] === "BACK" ? gl.BACK : gl.FRONT);
        }

        resizeToDisplaySize(canvas);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.1, 0.12, 0.16, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        const model = multiply(rotationY(t * 0.8), rotationX(t * 0.4));
        const view = lookAt([0, 0, 3], [0, 0, 0], [0, 1, 0]);
        const proj = perspective(toRadians(50), canvas.width / canvas.height, 0.1, 100);
        gl.uniformMatrix4fv(uMvp, false, multiply(multiply(proj, view), model));
        gl.drawElements(gl.TRIANGLES, cube.indexCount, gl.UNSIGNED_SHORT, 0);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      console.log("toggle cull mode: BACK (solid) / FRONT (see-through) / OFF");
    </script>
  </body>
</html>
