<!doctype html>
<!--
  A1 · 02 — Your first triangle
  The whole pipeline on one page: a position buffer → a vertex attribute → a
  vertex shader that passes clip-space positions through → a fragment shader that
  paints a solid color. Uses the gl.js helpers you just built.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGL_API/Tutorial
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A1·02 first triangle</title>
    <style>canvas { width: 320px; height: 240px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "./gl.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      // GLSL ES 3.00. The `#version` line MUST be the very first thing — no
      // leading spaces or blank line before it (note the backtick placement).
      const vs = glsl`#version 300 es
        in vec2 a_position;                 // per-vertex input, fed from the buffer
        void main() {
          gl_Position = vec4(a_position, 0.0, 1.0); // clip space, x/y in -1..1
        }`;

      const fs = glsl`#version 300 es
        precision highp float;
        out vec4 outColor;                  // WebGL2 names its own output variable
        void main() {
          outColor = vec4(1.0, 0.4, 0.2, 1.0); // solid orange
        }`;

      const program = createProgram(gl, vs, fs);

      // A triangle in clip space. Two floats (x, y) per vertex.
      const positions = new Float32Array([
        0.0, 0.6,
        -0.6, -0.6,
        0.6, -0.6,
      ]);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

      // A VAO records how to pull a_position out of that buffer.
      const loc = gl.getAttribLocation(program, "a_position");
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0); // 2 floats, tightly packed

      resizeToDisplaySize(canvas);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clearColor(0.1, 0.12, 0.16, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);

      gl.useProgram(program);
      gl.bindVertexArray(vao);
      gl.drawArrays(gl.TRIANGLES, 0, 3); // 3 vertices → 1 triangle
      console.log("drew a triangle");
    </script>
  </body>
</html>
