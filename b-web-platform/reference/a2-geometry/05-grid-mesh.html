<!doctype html>
<!--
  A2 · 05 — A generated grid mesh (programmatic geometry + indices)
  Real geometry is generated in code, not hand-typed. Build an (N+1)×(N+1) grid of
  vertices in a loop, then an index buffer of two triangles per cell. Color each
  vertex by its grid position so the structure is visible. One drawElements call
  renders the whole thing.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGLRenderingContext/drawElements
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A2·05 grid mesh</title>
    <style>canvas { width: 320px; height: 320px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec2 a_position; in vec3 a_color; out vec3 v_color;
        void main() { v_color = a_color; gl_Position = vec4(a_position, 0.0, 1.0); }`;
      const fs = glsl`#version 300 es
        precision highp float; in vec3 v_color; out vec4 outColor;
        void main() { outColor = vec4(v_color, 1.0); }`;
      const program = createProgram(gl, vs, fs);

      // Generate an (N+1)×(N+1) grid of vertices spanning clip space -0.9..0.9.
      const N = 8;
      const verts = []; // x, y, r, g, b per vertex
      for (let row = 0; row <= N; row++) {
        for (let col = 0; col <= N; col++) {
          const x = -0.9 + (1.8 * col) / N;
          const y = -0.9 + (1.8 * row) / N;
          verts.push(x, y, col / N, row / N, 0.6); // color by grid position
        }
      }

      // Two triangles per cell, referencing the shared grid vertices by index.
      const indices = [];
      const idx = (r, c) => r * (N + 1) + c;
      for (let row = 0; row < N; row++) {
        for (let col = 0; col < N; col++) {
          const a = idx(row, col);
          const b = idx(row, col + 1);
          const c = idx(row + 1, col);
          const d = idx(row + 1, col + 1);
          indices.push(a, b, c, b, d, c);
        }
      }

      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(verts), gl.STATIC_DRAW);
      const FLOAT = 4;
      const stride = 5 * FLOAT;
      const posLoc = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, stride, 0);
      const colorLoc = gl.getAttribLocation(program, "a_color");
      gl.enableVertexAttribArray(colorLoc);
      gl.vertexAttribPointer(colorLoc, 3, gl.FLOAT, false, stride, 2 * FLOAT);

      const ibo = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);

      resizeToDisplaySize(canvas);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clearColor(0.1, 0.12, 0.16, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(program);
      gl.bindVertexArray(vao);
      gl.drawElements(gl.TRIANGLES, indices.length, gl.UNSIGNED_SHORT, 0);
      console.log(`grid: ${(N + 1) ** 2} verts, ${indices.length / 3} triangles`);
    </script>
  </body>
</html>
