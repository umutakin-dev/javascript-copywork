<!doctype html>
<!--
  A2 · 02 — Interleaved attributes: position + color in ONE buffer
  Instead of two buffers, pack [x,y, r,g,b, x,y, r,g,b, ...] into a single buffer
  and use the STRIDE and OFFSET arguments of vertexAttribPointer to pick each
  attribute out. This is how real meshes are stored — one vertex = one record.
  Same rainbow triangle as A2·01, different memory layout.
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/WebGLRenderingContext/vertexAttribPointer
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A2·02 interleaved</title>
    <style>canvas { width: 320px; height: 240px; border: 1px solid #999; }</style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import { createProgram, resizeToDisplaySize, glsl } from "../a1-webgl-first/gl.js";

      const canvas = document.querySelector("#c");
      const gl = canvas.getContext("webgl2");
      if (!gl) throw new Error("WebGL2 not available");

      const vs = glsl`#version 300 es
        in vec2 a_position;
        in vec3 a_color;
        out vec3 v_color;
        void main() {
          v_color = a_color;
          gl_Position = vec4(a_position, 0.0, 1.0);
        }`;
      const fs = glsl`#version 300 es
        precision highp float;
        in vec3 v_color;
        out vec4 outColor;
        void main() { outColor = vec4(v_color, 1.0); }`;

      const program = createProgram(gl, vs, fs);

      // One record per vertex: x, y, r, g, b  (5 floats = 20 bytes).
      const data = new Float32Array([
        //  x     y    r  g  b
        0.0, 0.6, 1, 0, 0,
        -0.6, -0.6, 0, 1, 0,
        0.6, -0.6, 0, 0, 1,
      ]);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);

      const FLOAT = 4; // bytes per float
      const stride = 5 * FLOAT; // bytes from one vertex to the next
      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);

      const posLoc = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, stride, 0); // starts at byte 0

      const colorLoc = gl.getAttribLocation(program, "a_color");
      gl.enableVertexAttribArray(colorLoc);
      gl.vertexAttribPointer(colorLoc, 3, gl.FLOAT, false, stride, 2 * FLOAT); // after x,y

      resizeToDisplaySize(canvas);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clearColor(0.1, 0.12, 0.16, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(program);
      gl.bindVertexArray(vao);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      console.log("same triangle — interleaved buffer, stride 20 bytes");
    </script>
  </body>
</html>
