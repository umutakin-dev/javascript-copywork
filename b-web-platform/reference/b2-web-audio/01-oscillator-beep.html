<!doctype html>
<!--
  B2 · 01 — AudioContext + the node graph: a beep
  Web Audio is a GRAPH of nodes. Connect an oscillator → a gain → the speakers
  (ctx.destination) and you get sound. Browsers start the AudioContext SUSPENDED
  until a user gesture, so we create it on a click (which also resumes it).
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/AudioContext
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>B2·01 beep</title>
    <style>body { font: 15px system-ui; max-width: 32rem; margin: 2rem auto; }</style>
  </head>
  <body>
    <p><button id="beep">Beep</button></p>
    <p>each click plays a short note — the graph is osc → gain → destination.</p>
    <script type="module">
      let ctx;
      document.querySelector("#beep").addEventListener("click", () => {
        ctx ??= new AudioContext(); // the first gesture creates (and unlocks) it

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 440; // A4
        gain.gain.value = 0.2; // keep it gentle

        osc.connect(gain).connect(ctx.destination); // wire up the graph

        const now = ctx.currentTime;
        osc.start(now);
        osc.stop(now + 0.2); // a stopped oscillator can't restart — make a new one each beep
      });
    </script>
  </body>
</html>
