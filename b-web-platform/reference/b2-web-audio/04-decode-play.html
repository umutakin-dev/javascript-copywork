<!doctype html>
<!--
  B2 · 04 — decodeAudioData: decode a clip into an AudioBuffer, then control playback
  decodeAudioData turns encoded audio bytes (mp3/wav/…) into an AudioBuffer you play
  with an AudioBufferSourceNode. To stay asset-free we SYNTHESIZE a short tone, encode
  it to a WAV in code, then decode that — exactly the path a fetched file takes.
  Source nodes are one-shot: loop, playbackRate, and detune are set BEFORE start().
  Ref: https://developer.mozilla.org/en-US/docs/Web/API/BaseAudioContext/decodeAudioData
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>B2·04 decode + play</title>
    <style>body { font: 15px system-ui; max-width: 32rem; margin: 2rem auto; }</style>
  </head>
  <body>
    <p><button id="play">Play</button> <button id="stop" disabled>Stop</button></p>
    <p><label><input type="checkbox" id="loop" /> loop</label></p>
    <p><label>rate <input id="rate" type="range" min="0.5" max="2" step="0.05" value="1" /></label> <span id="rateVal">1.00</span>×</p>
    <p><label>detune <input id="detune" type="range" min="-1200" max="1200" step="10" value="0" /></label> <span id="detuneVal">0</span> cents</p>
    <script type="module">
      // Minimal WAV encoder: mono, 16-bit PCM, little-endian.
      function encodeWAV(samples, sampleRate) {
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);
        const writeStr = (off, str) => {
          for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i));
        };
        writeStr(0, "RIFF");
        view.setUint32(4, 36 + samples.length * 2, true);
        writeStr(8, "WAVE");
        writeStr(12, "fmt ");
        view.setUint32(16, 16, true); // PCM chunk size
        view.setUint16(20, 1, true); // format = PCM
        view.setUint16(22, 1, true); // channels = 1
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true); // byte rate
        view.setUint16(32, 2, true); // block align
        view.setUint16(34, 16, true); // bits per sample
        writeStr(36, "data");
        view.setUint32(40, samples.length * 2, true);
        let off = 44;
        for (const s of samples) {
          const clamped = Math.max(-1, Math.min(1, s));
          view.setInt16(off, clamped * 32767, true);
          off += 2;
        }
        return buffer;
      }

      // A plucked-string-ish tone: a sine with an exponential decay.
      function synth(sampleRate) {
        const n = Math.floor(sampleRate * 0.7);
        const samples = new Float32Array(n);
        for (let i = 0; i < n; i++) {
          const t = i / sampleRate;
          samples[i] = Math.exp(-4 * t) * Math.sin(2 * Math.PI * 220 * t) * 0.7;
        }
        return samples;
      }

      let ctx;
      let audioBuffer;
      let source;
      const rate = document.querySelector("#rate");
      const detune = document.querySelector("#detune");
      const stopBtn = document.querySelector("#stop");
      rate.addEventListener("input", () => (document.querySelector("#rateVal").textContent = Number(rate.value).toFixed(2)));
      detune.addEventListener("input", () => (document.querySelector("#detuneVal").textContent = detune.value));

      document.querySelector("#play").addEventListener("click", async () => {
        ctx ??= new AudioContext();
        if (!audioBuffer) {
          const wav = encodeWAV(synth(ctx.sampleRate), ctx.sampleRate);
          audioBuffer = await ctx.decodeAudioData(wav); // the decode step
        }
        source = ctx.createBufferSource();
        source.buffer = audioBuffer;
        source.loop = document.querySelector("#loop").checked;
        source.playbackRate.value = Number(rate.value); // speed AND pitch
        source.detune.value = Number(detune.value); // pitch only, in cents
        source.connect(ctx.destination);
        source.start();
        stopBtn.disabled = false;
      });

      stopBtn.addEventListener("click", () => {
        source?.stop();
        stopBtn.disabled = true;
      });
    </script>
  </body>
</html>
